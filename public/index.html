<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simbi Loader</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div>Connecting to Simbi...</div>

    <script src="capacitor.js"></script>
    <script>
        // Hardware Back Button Navigation Handler
        if (window.Capacitor) {
            const { App } = Capacitor.Plugins;
            if (App) {
                App.addListener('backButton', () => {
                    if (window.history.length > 1) {
                        window.history.back();
                    } else {
                        App.exitApp();
                    }
                });
            }

            // Core Capacitor Native Sharing Linkage
            window.addEventListener('simbiFileDownloaded', async () => {
                const fileData = window.lastGeneratedFile;
                if (!fileData) return;

                try {
                    const { Share } = Capacitor.Plugins;
                    
                    // The core Share plugin allows sharing via standard file data URLs natively
                    await Share.share({
                        title: `Share ${fileData.filename}`,
                        url: fileData.base64, // Passes the dataurl string directly to the sharesheet
                        dialogTitle: 'Save or Share your Simbi Document'
                    });
                } catch (error) {
                    console.error("Native system share bridge execution failed:", error);
                }
            });
        }

        // Direct handoff to your live Vercel ecosystem
        window.location.href = "https://simbi-kappa.vercel.app";
    </script>
</body>
</html>
